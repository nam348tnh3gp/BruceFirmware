; ============================================================================
; PlatformIO Project Configuration - CHUẨN CHO CẢ S3 VÀ C5
; ============================================================================

; ==================== ESP32-C5 (Slave - RF/NFC/IR) ====================
[env:esp32-c5]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-c5-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.partitions = custom_8Mb.csv

lib_ldf_mode = deep+
build_src_filter = +<*> -<esp32s3.cpp>

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DDEVICE_NAME='"ESP32-C5"'
    
    ; ===== UART giao tiếp với ESP32-S3 =====
    -DUART_S3_RX=17
    -DUART_S3_TX=18
    
    ; ===== SPI chung cho NRF24 và CC1101 =====
    -DSPI_MOSI=25
    -DSPI_MISO=26
    -DSPI_SCK=27
    -DSPI_SS=14
    
    ; ===== NRF24L01 & CC1101 & PN532 =====
    -DUSE_NRF24_VIA_SPI=1
    -DNRF24_CE_PIN=13
    -DNRF24_SS_PIN=14
    -DUSE_CC1101_VIA_SPI=1
    -DCC1101_SS_PIN=15
    -DPN532_SDA=4
    -DPN532_SCL=5
    -DNFC_INTERFACE_I2C=1
    
    ; ===== IR =====
    -DIR_TX_PIN=24
    -DIR_RX_PIN=23

lib_deps =
    https://github.com/nRF24/RF24.git
    https://github.com/LSatan/SmartRC-CC1101-Driver-Lib.git
    https://github.com/Seeed-Studio/PN532.git
    https://github.com/Arduino-IRremote/Arduino-IRremote.git


; ==================== ESP32-S3 (Main - UI + WiFi/BLE) ====================
[env:esp32-s3]
platform = espressif32@6.5.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; --- CẤU HÌNH BỘ NHỚ AN TOÀN CHỐNG SẬP MẠCH ---
board_build.flash_mode = dio
board_build.partitions = default_8MB.csv

build_src_filter = +<*> -<esp32c5.cpp>

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DUSB_as_HID=1
    -DDEVICE_NAME='"ESP32-S3 Main"'
    
    ; ===== UART giao tiếp với ESP32-C5 =====
    -DUART_C5_TX=17
    -DUART_C5_RX=18
    
    ; ===== MÀN HÌNH ST7789 (ĐÃ THÊM FONT VÀ TỐC ĐỘ) =====
    -DUSER_SETUP_LOADED=1
    -DST7789_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_CS=10
    -DTFT_DC=14
    -DTFT_RST=15
    -DTFT_MOSI=11
    -DTFT_SCLK=12
    -DTFT_BL=21
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT8=1
    -DSPI_FREQUENCY=27000000
    -DSMOOTH_FONT=1
    
    ; ===== SD Card =====
    -DUSE_SD_CARD=1
    -DSDCARD_CS=9
    -DSDCARD_MOSI=11
    -DSDCARD_MISO=13
    -DSDCARD_SCK=12
    
    ; ===== Phím 5 chiều =====
    -DUP_BTN=1
    -DDW_BTN=2
    -DLF_BTN=3
    -DRT_BTN=38
    -DSEL_BTN=39

lib_deps =
    bodmer/TFT_eSPI@^2.5.0