; ============================================================================
; PlatformIO Project Configuration - TÙY CHỈNH THEO SƠ ĐỒ CHÂN CỦA BẠN
; ============================================================================

; ==================== ESP32-C5 (Slave - RF/NFC/IR) ====================
[env:esp32-c5]
platform = espressif32
board = esp32-c5-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.partitions = custom_8Mb.csv

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DDEVICE_NAME='"ESP32-C5"'
    
    ; ===== UART giao tiếp với ESP32-S3 =====
    -DUART_S3_RX=17
    -DUART_S3_TX=18
    
    ; ===== SPI chung cho NRF24 và CC1101 =====
    -DSPI_MOSI=25
    -DSPI_MISO=26
    -DSPI_SCK=27
    -DSPI_SS=14
    
    ; ===== NRF24L01 =====
    -DUSE_NRF24_VIA_SPI=1
    -DNRF24_CE_PIN=13
    -DNRF24_SS_PIN=14
    -DNRF24_MOSI_PIN=25
    -DNRF24_SCK_PIN=27
    -DNRF24_MISO_PIN=26
    
    ; ===== CC1101 =====
    -DUSE_CC1101_VIA_SPI=1
    -DCC1101_SS_PIN=15
    -DCC1101_GDO0_PIN=28
    -DCC1101_MOSI_PIN=25
    -DCC1101_SCK_PIN=27
    -DCC1101_MISO_PIN=26
    
    ; ===== NFC PN532 (I2C) =====
    -DPN532_SDA=4
    -DPN532_SCL=5
    
    ; ===== IR =====
    -DIR_TX_PIN=24
    -DIR_RX_PIN=23
    
    ; ===== Tắt các thứ không dùng trên C5 =====
    -DSDCARD_CS=-1
    -DSDCARD_SCK=-1
    -DSDCARD_MISO=-1
    -DSDCARD_MOSI=-1
    -DTFT_CS=-1
    -DTFT_DC=-1
    -DTFT_RST=-1
    -DTFT_BL=-1
    -DBACKLIGHT=-1

lib_deps =
    nRF24/RF24@^1.4.8
    LSatan/SmartRC-CC1101-Driver-RF@^2.9.5
    elechouse/PN532@^1.4.0
    z3t0/Arduino-IRremote@^4.4.0


; ==================== ESP32-S3 (Main - UI + WiFi/BLE) ====================
[env:esp32-s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.flash_mode = qio
board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_opi

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DUSB_as_HID=1
    -DDEVICE_NAME='"ESP32-S3 Main"'
    
    ; ===== UART giao tiếp với ESP32-C5 =====
    -DUART_C5_TX=17
    -DUART_C5_RX=18
    
    ; ===== Màn hình ST7789 (SPI) =====
    -DTFT_MODEL=ST7789
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_CS=10
    -DTFT_DC=14
    -DTFT_RST=15
    -DTFT_MOSI=11
    -DTFT_SCLK=12
    -DTFT_BL=21
    -DROTATION=1
    -DSMOOTH_FONT=1
    -DUSER_SETUP_LOADED=1
    
    ; ===== SD Card (dùng chung SPI với màn hình) =====
    -DUSE_SD_CARD=1
    -DSDCARD_CS=9
    -DSDCARD_MOSI=11
    -DSDCARD_MISO=13
    -DSDCARD_SCK=12
    
    ; ===== Phím 5 chiều =====
    -DUP_BTN=1
    -DDW_BTN=2
    -DLF_BTN=3
    -DRT_BTN=38
    -DSEL_BTN=39
    -DBTN_ALIAS='"OK"'
    
    ; ===== Cấu hình chung =====
    -DTXLED=40
    -DLED_ON=HIGH
    -DLED_OFF=LOW
    -DFP=1
    -DFM=2
    -DFG=3
    -DMINBRIGHT=160
    
    ; ===== Tắt CC1101/NRF24 trên S3 (đã có trên C5) =====
    -DUSE_CC1101_VIA_SPI=0
    -DUSE_NRF24_VIA_SPI=0
    
    ; ===== Tắt FM Radio, Mic =====
    ; -DFM_SI4713=0
    ; -DMIC_SPM1423=0

lib_deps =
    bodmer/TFT_eSPI@^2.5.0
    arduino-libraries/SD@^1.3.0
    lorol/LittleFS_esp32@^1.0.6
